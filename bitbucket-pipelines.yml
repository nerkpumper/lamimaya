    develop:       
    - step:        
        script: 
          - apt-get update 
          - apt-get -qq install git-ftp        
          - git config git-ftp.syncroot html/
          - git ftp init --user $FTP_TEST_USERNAME --passwd $FTP_TEST_PASSWORD ftp://ftp.mvtooling.com/public_html/galvamextest    
          - git config git-ftp.syncroot include/
          - git ftp init --user $FTP_TEST_USERNAME --passwd $FTP_TEST_PASSWORD ftp://ftp.mvtooling.com/galvamextest/include
          - git config git-ftp.syncroot deployment/qa/include/
          - git ftp init --user $FTP_TEST_USERNAME --passwd $FTP_TEST_PASSWORD ftp://ftp.mvtooling.com/public_html/galvamextest
          - git config git-ftp.syncroot deployment/qa/conexion/
          - git ftp init --user $FTP_TEST_USERNAME --passwd $FTP_TEST_PASSWORD ftp://ftp.mvtooling.com/galvamextest/include/lib/Conexion
          - git config git-ftp.syncroot deployment/qa/constantes/
