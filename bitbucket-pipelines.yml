          # - git ftp init --user $LAMIMAYA_USERNAME --passwd $LAMIMAYA_PASSWORD ftp://ftp.lamimaya.com/public_html/qagalvamex
          # - git config git-ftp.syncroot deployment/prod/conexion/
          # - git ftp init --user $LAMIMAYA_USERNAME --passwd $LAMIMAYA_PASSWORD ftp://ftp.lamimaya.com/qagalvamex/include/lib/Conexion
          # - git config git-ftp.syncroot deployment/prod/constantes/
